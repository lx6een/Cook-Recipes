<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cook Recipes — Главная</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="/" class="logo">🍳 Cook <span>Recipes</span></a>
      <ul class="nav-links">
        <li><a href="/" class="active">Главная</a></li>
        <li><a href="/foods">Продукты</a></li>
        <li><a href="/recipes">Рецепты</a></li>
        <li><a href="/mealplans">Рацион</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">
    <section class="hero">

    <section class="stats-grid" id="stats">

        <div class="icon">📖</div>
        <div class="value" id="stat-recipes">—</div>
        <div class="label">Рецептов</div>
      </div>
      <div class="stat-card">
        <div class="icon">📅</div>
        <div class="value" id="stat-plans">—</div>
        <div class="label">Рационов</div>
      </div>
    </section>

  <script src="/static/js/app.js"></script>
